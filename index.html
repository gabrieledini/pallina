<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tieni la Pallina!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    font-family: -apple-system, system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #game {
    display: block;
    width: 100vw;
    height: 100vh;
    background: #1a1a2e;
  }
  #hud {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
    font-size: 18px;
    pointer-events: none;
    z-index: 10;
  }
  #score {
    font-size: 24px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  #best { opacity: 0.6; font-size: 14px; }
  #addBtn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #e94560;
    color: white;
    border: none;
    font-size: 36px;
    font-weight: 300;
    box-shadow: 0 4px 20px rgba(233, 69, 96, 0.5);
    z-index: 10;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  #addBtn:active { transform: translateX(-50%) scale(0.9); }
  #addBtn:disabled { opacity: 0.3; }
  #ballCount {
    position: fixed;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 13px;
    opacity: 0.6;
    z-index: 10;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 46, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    padding: 30px;
    z-index: 20;
  }
  #overlay h1 {
    font-size: 32px;
    margin-bottom: 16px;
    font-weight: 700;
  }
  #overlay p {
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 24px;
    opacity: 0.85;
    max-width: 320px;
  }
  #startBtn {
    padding: 16px 40px;
    font-size: 18px;
    font-weight: 600;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 30px;
    box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
    cursor: pointer;
  }
  #startBtn:active { transform: scale(0.95); }
  #debug {
    position: fixed;
    top: 60px;
    right: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #43d9ad;
    font-family: monospace;
    font-size: 11px;
    padding: 8px 10px;
    border-radius: 6px;
    z-index: 15;
    line-height: 1.5;
    pointer-events: none;
    min-width: 130px;
  }
  #debug .err { color: #ff6b6b; }
  #debug .ok { color: #43d9ad; }
  .hidden { display: none !important; }
  .finalScore { font-size: 48px; color: #e94560; font-weight: 700; margin: 20px 0; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div>
    <div id="score">0.0s</div>
    <div id="best">Record: 0.0s</div>
  </div>
</div>

<div id="ballCount">Palline: 1 / 3</div>
<button id="addBtn">+</button>
<div id="debug">sensore: ...</div>

<div id="overlay">
  <h1>🎯 Tieni la Pallina!</h1>
  <p>Ruota il telefono per cambiare la direzione della gravità ed evita che la pallina cada nel buco.<br><br>Aggiungi fino a 3 palline per più punti!</p>
  <button id="startBtn">Inizia</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const ballCountEl = document.getElementById('ballCount');
  const addBtn = document.getElementById('addBtn');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const debugEl = document.getElementById('debug');

  let sensorEventCount = 0;
  let sensorStatus = 'in attesa...';

  function updateDebug() {
    debugEl.innerHTML =
      `eventi: ${sensorEventCount}<br>` +
      `stato: <span class="${sensorEventCount > 0 ? 'ok' : 'err'}">${sensorStatus}</span><br>` +
      `β: ${restBeta === null ? '—' : (restBeta).toFixed(1) + '°'}<br>` +
      `γ: ${restGamma === null ? '—' : (restGamma).toFixed(1) + '°'}<br>` +
      `gX: ${gravityX.toFixed(2)}<br>` +
      `gY: ${gravityY.toFixed(2)}`;
  }

  let W = 0, H = 0, DPR = 1;
  let box = {};
  let hole = {};
  const BALL_RADIUS = 18;
  const MAX_BALLS = 3;
  const BOUNCE = 0.92;
  const FRICTION = 0.998;

  let balls = [];
  let gravityX = 0;
  let gravityY = 0;
  let running = false;
  let startTime = 0;
  let elapsed = 0;
  let best = parseFloat(localStorage.getItem('keepball_best') || '0');
  bestEl.textContent = 'Record: ' + best.toFixed(1) + 's';

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    // Margini adattivi: in landscape riduciamo i pad verticali per non schiacciare la scatola
    const isLandscape = W > H;
    const margin = isLandscape ? 20 : 30;
    const topPad = isLandscape ? 50 : 80;
    const bottomPad = isLandscape ? 90 : 160;

    box.x = margin;
    box.y = topPad;
    box.w = W - margin * 2;
    box.h = H - topPad - bottomPad;
    box.thickness = 12;

    // Buco proporzionale alla larghezza della scatola
    const holeSize = Math.min(70, box.w * 0.18);
    hole.side = 'bottom';
    hole.start = box.x + box.w * 0.35;
    hole.end = hole.start + holeSize;
  }

  function spawnBall() {
    if (balls.length >= MAX_BALLS) return;
    const cx = box.x + box.w / 2;
    const cy = box.y + box.h / 2;
    // Offset così non si sovrappongono
    const offset = balls.length * 30;
    balls.push({
      x: cx + offset - 30,
      y: cy - 50,
      vx: -14, // forte spinta iniziale verso sinistra
      vy: 0,
      color: ['#f9c80e', '#43d9ad', '#3e92cc'][balls.length]
    });
    updateBallCount();
  }

  function updateBallCount() {
    ballCountEl.textContent = `Palline: ${balls.length} / ${MAX_BALLS}`;
    addBtn.disabled = balls.length >= MAX_BALLS;
  }

  function reset() {
    balls = [];
    spawnBall();
    elapsed = 0;
    startTime = performance.now();
    running = true;
  }

  function isInHole(x, side) {
    // Verifica se la posizione x cade dentro il buco sul lato specificato
    if (side !== hole.side) return false;
    return x >= hole.start && x <= hole.end;
  }

  function checkBallInHole(b) {
    // La pallina è uscita dalla scatola attraverso il buco?
    if (hole.side === 'bottom') {
      if (b.y - BALL_RADIUS > box.y + box.h + 50) return true;
    } else if (hole.side === 'top') {
      if (b.y + BALL_RADIUS < box.y - 50) return true;
    } else if (hole.side === 'left') {
      if (b.x + BALL_RADIUS < box.x - 50) return true;
    } else if (hole.side === 'right') {
      if (b.x - BALL_RADIUS > box.x + box.w + 50) return true;
    }
    return false;
  }

  function physicsStep(b) {
    // Applica gravità
    b.vx += gravityX;
    b.vy += gravityY;
    // Frizione aria leggera
    b.vx *= FRICTION;
    b.vy *= FRICTION;

    b.x += b.vx;
    b.y += b.vy;

    // Cap velocità massima (evita palline troppo veloci con BOUNCE alto)
    const MAX_SPEED = 18;
    const speed = Math.hypot(b.vx, b.vy);
    if (speed > MAX_SPEED) {
      b.vx = (b.vx / speed) * MAX_SPEED;
      b.vy = (b.vy / speed) * MAX_SPEED;
    }

    const left = box.x + box.thickness / 2;
    const right = box.x + box.w - box.thickness / 2;
    const top = box.y + box.thickness / 2;
    const bottom = box.y + box.h - box.thickness / 2;

    // Collisioni con i muri (eccetto sopra il buco)
    // Bottom
    if (b.y + BALL_RADIUS > bottom) {
      if (!isInHole(b.x, 'bottom')) {
        b.y = bottom - BALL_RADIUS;
        b.vy = -b.vy * BOUNCE;
      }
    }
    // Top
    if (b.y - BALL_RADIUS < top) {
      if (!isInHole(b.x, 'top')) {
        b.y = top + BALL_RADIUS;
        b.vy = -b.vy * BOUNCE;
      }
    }
    // Left
    if (b.x - BALL_RADIUS < left) {
      if (!isInHole(b.y, 'left')) {
        b.x = left + BALL_RADIUS;
        b.vx = -b.vx * BOUNCE;
      }
    }
    // Right
    if (b.x + BALL_RADIUS > right) {
      if (!isInHole(b.y, 'right')) {
        b.x = right - BALL_RADIUS;
        b.vx = -b.vx * BOUNCE;
      }
    }
  }

  function resolveBallCollisions() {
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const minDist = BALL_RADIUS * 2;
        if (dist < minDist && dist > 0) {
          const nx = dx / dist;
          const ny = dy / dist;
          const overlap = (minDist - dist) / 2;
          a.x -= nx * overlap;
          a.y -= ny * overlap;
          b.x += nx * overlap;
          b.y += ny * overlap;
          // Scambio impulsi semplificato lungo la normale
          const dvx = b.vx - a.vx;
          const dvy = b.vy - a.vy;
          const vn = dvx * nx + dvy * ny;
          if (vn < 0) {
            const impulse = vn * 0.98;
            a.vx += impulse * nx;
            a.vy += impulse * ny;
            b.vx -= impulse * nx;
            b.vy -= impulse * ny;
          }
        }
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Sfondo box leggero
    ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
    ctx.fillRect(box.x, box.y, box.w, box.h);

    // Disegna i 4 lati come segmenti, lasciando il buco
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = box.thickness;
    ctx.lineCap = 'round';

    // Top
    ctx.beginPath();
    ctx.moveTo(box.x, box.y);
    ctx.lineTo(box.x + box.w, box.y);
    ctx.stroke();
    // Left
    ctx.beginPath();
    ctx.moveTo(box.x, box.y);
    ctx.lineTo(box.x, box.y + box.h);
    ctx.stroke();
    // Right
    ctx.beginPath();
    ctx.moveTo(box.x + box.w, box.y);
    ctx.lineTo(box.x + box.w, box.y + box.h);
    ctx.stroke();
    // Bottom con buco
    ctx.beginPath();
    ctx.moveTo(box.x, box.y + box.h);
    ctx.lineTo(hole.start, box.y + box.h);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(hole.end, box.y + box.h);
    ctx.lineTo(box.x + box.w, box.y + box.h);
    ctx.stroke();

    // Evidenziatore del buco (linee tratteggiate che indicano dove cadere è game over)
    ctx.strokeStyle = 'rgba(233, 69, 96, 0.4)';
    ctx.lineWidth = 3;
    ctx.setLineDash([6, 8]);
    ctx.beginPath();
    ctx.moveTo(hole.start, box.y + box.h + 4);
    ctx.lineTo(hole.start, box.y + box.h + 30);
    ctx.moveTo(hole.end, box.y + box.h + 4);
    ctx.lineTo(hole.end, box.y + box.h + 30);
    ctx.stroke();
    ctx.setLineDash([]);

    // Indicatore gravità (piccola freccia al centro della scatola)
    const cx = box.x + box.w / 2;
    const cy = box.y + box.h / 2;
    const gMag = Math.hypot(gravityX, gravityY);
    if (gMag > 0.05) {
      const len = 25;
      const angle = Math.atan2(gravityY, gravityX);
      const ex = cx + Math.cos(angle) * len;
      const ey = cy + Math.sin(angle) * len;
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(ex, ey);
      ctx.stroke();
      // Punta freccia
      ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.beginPath();
      ctx.arc(ex, ey, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Palline
    for (const b of balls) {
      // Ombra
      ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
      ctx.beginPath();
      ctx.arc(b.x + 2, b.y + 3, BALL_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      // Palla
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, BALL_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      // Riflesso
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.beginPath();
      ctx.arc(b.x - BALL_RADIUS * 0.35, b.y - BALL_RADIUS * 0.35, BALL_RADIUS * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function loop() {
    if (!running) return;

    for (const b of balls) physicsStep(b);
    resolveBallCollisions();

    // Verifica se qualche pallina è uscita dal buco
    for (let i = balls.length - 1; i >= 0; i--) {
      if (checkBallInHole(balls[i])) {
        balls.splice(i, 1);
        updateBallCount();
      }
    }

    elapsed = (performance.now() - startTime) / 1000;
    scoreEl.textContent = elapsed.toFixed(1) + 's';

    if (balls.length === 0) {
      running = false;
      gameOver();
      return;
    }

    draw();
    requestAnimationFrame(loop);
  }

  function gameOver() {
    if (elapsed > best) {
      best = elapsed;
      localStorage.setItem('keepball_best', best.toString());
      bestEl.textContent = 'Record: ' + best.toFixed(1) + 's';
    }
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <h1>Game Over!</h1>
      <div class="finalScore">${elapsed.toFixed(1)}s</div>
      <p>Record: ${best.toFixed(1)}s</p>
      <button id="startBtn">Rigioca</button>
    `;
    document.getElementById('startBtn').addEventListener('click', startGame);
  }

  // Calibrazione: il primo evento di orientamento definisce la posizione di "riposo".
  // Da quel momento misuriamo le variazioni rispetto al riposo.
  let restBeta = null;
  let restGamma = null;

  // Il telefono rappresenta un tavolino orizzontale visto dall'alto.
  // - Tavolino perfettamente piatto → nessuna gravità (la pallina prosegue per inerzia).
  // - Inclinando un lato verso il basso, la pallina rotola in quella direzione.
  // beta:  rotazione attorno all'asse X del telefono. Positivo = parte alta del telefono sollevata
  //        (verso l'utente) → il tavolino è inclinato in modo che la pallina scivoli verso il basso dello schermo.
  // gamma: rotazione attorno all'asse Y del telefono. Positivo = lato destro abbassato
  //        → la pallina scivola a destra.
  function handleOrientation(e) {
    sensorEventCount++;
    sensorStatus = 'attivo';

    if (e.gamma === null || e.beta === null) {
      sensorStatus = 'valori null';
      updateDebug();
      return;
    }

    // Calibrazione al primo evento: la posizione di tenuta attuale diventa "tavolino orizzontale".
    if (restBeta === null) {
      restBeta = e.beta;
      restGamma = e.gamma;
      updateDebug();
      return;
    }

    let deltaGamma = e.gamma - restGamma; // inclinazione laterale rispetto al riposo
    let deltaBeta = e.beta - restBeta;    // inclinazione avanti/indietro rispetto al riposo

    // Mostro i delta correnti nel debug
    debugEl.innerHTML =
      `eventi: ${sensorEventCount}<br>` +
      `stato: <span class="ok">attivo</span><br>` +
      `Δβ: ${deltaBeta.toFixed(1)}°<br>` +
      `Δγ: ${deltaGamma.toFixed(1)}°<br>` +
      `gX: ${gravityX.toFixed(2)}<br>` +
      `gY: ${gravityY.toFixed(2)}`;

    // Sensibilità: 20° di inclinazione = gravità piena lungo quell'asse
    const SENSITIVITY_DEG = 20;
    let tiltX = Math.max(-1, Math.min(1, deltaGamma / SENSITIVITY_DEG));
    let tiltY = Math.max(-1, Math.min(1, deltaBeta / SENSITIVITY_DEG));

    // Compensa l'orientamento dello schermo (portrait/landscape)
    const screenAngle = (screen.orientation && screen.orientation.angle) || window.orientation || 0;
    let gx = tiltX, gy = tiltY;
    switch (screenAngle) {
      case 90:
        [gx, gy] = [gy, -gx];
        break;
      case -90:
      case 270:
        [gx, gy] = [-gy, gx];
        break;
      case 180:
        [gx, gy] = [-gx, -gy];
        break;
    }

    // Gravità = componente del peso lungo il piano inclinato del tavolino.
    // Nessuna componente "fissa": se il tavolino è piatto la pallina non subisce forze.
    const TILT_GRAVITY = 1.0;
    gravityX = gx * TILT_GRAVITY;
    gravityY = gy * TILT_GRAVITY;
  }

  // Permetti ricalibrazione (utile se l'utente cambia posizione)
  function recalibrate() {
    restBeta = null;
    restGamma = null;
    gravityX = 0;
    gravityY = 0;
  }

  async function requestMotionPermission() {
    sensorStatus = 'richiesta permesso...';
    updateDebug();

    // iOS 13+ richiede permesso esplicito
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const r = await DeviceOrientationEvent.requestPermission();
        if (r === 'granted') {
          sensorStatus = 'permesso ok';
          window.addEventListener('deviceorientation', handleOrientation);
        } else {
          sensorStatus = 'permesso NEGATO';
        }
      } catch (err) {
        sensorStatus = 'errore: ' + err.message;
      }
    } else if ('DeviceOrientationEvent' in window) {
      sensorStatus = 'in ascolto...';
      window.addEventListener('deviceorientation', handleOrientation);
    } else {
      sensorStatus = 'sensore NON supportato';
    }
    updateDebug();
  }

  // Fallback per desktop: i tasti freccia simulano l'inclinazione del tavolino
  const KEY_TILT = 0.8;
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') gravityX = -KEY_TILT;
    if (e.key === 'ArrowRight') gravityX = KEY_TILT;
    if (e.key === 'ArrowUp') gravityY = -KEY_TILT;
    if (e.key === 'ArrowDown') gravityY = KEY_TILT;
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') gravityX = 0;
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') gravityY = 0;
  });

  function startGame() {
    overlay.classList.add('hidden');
    requestMotionPermission();
    recalibrate(); // la posizione attuale del telefono diventa il "riposo"
    resize();
    reset();
    requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click', startGame);
  addBtn.addEventListener('click', () => {
    if (running) spawnBall();
  });

  window.addEventListener('resize', () => {
    resize();
    recalibrate(); // se ruoto il telefono, ridefinisco il riposo
    if (!running) draw();
  });

  // Setup iniziale
  resize();
  updateDebug();
})();
</script>
</body>
</html>
